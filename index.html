<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Calculus Carnage — Prototype</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0d0f12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Carnage" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<style>
  :root {
    --bg: #0d0f12;
    --panel: #14181d;
    --panel-2: #1b2027;
    --line: #2a313b;
    --text: #e6e9ee;
    --muted: #8a93a0;
    --accent: #d64545;
    --accent-2: #e8a33d;
    --ok: #57b06b;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif; overflow: hidden; overscroll-behavior: none; }
  #app { display: grid; grid-template-columns: 1fr 320px; height: 100vh; height: 100dvh; }
  #stage { position: relative; background: #0a0c10; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; -webkit-user-select: none; user-select: none; }
  #stage { overflow: hidden; }
  #panel-toggle {
    display: none; position: absolute; top: calc(10px + env(safe-area-inset-top)); right: 10px;
    z-index: 10; background: rgba(20,24,29,0.85); border: 1px solid var(--line);
    color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 16px; cursor: pointer;
    backdrop-filter: blur(6px);
  }
  #hud {
    position: absolute; bottom: 14px; left: 14px;
    display: flex; gap: 8px; pointer-events: none;
  }
  .pill {
    background: rgba(20,24,29,0.85); border: 1px solid var(--line);
    padding: 6px 10px; border-radius: 999px; font-family: var(--mono); font-size: 12px;
    color: var(--muted); backdrop-filter: blur(6px);
  }
  .pill b { color: var(--text); font-weight: 600; }
  #tool-panel {
    border-bottom: 1px solid var(--line); padding: 8px 8px 6px;
    overflow-y: auto; max-height: 300px; flex-shrink: 0;
  }
  #toolbar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
  }
  .tool {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    padding: 7px 8px; border-radius: 7px; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 4px; line-height: 1.25;
    transition: background 0.12s, border-color 0.12s; text-align: left;
  }
  .tool:hover { background: #232a33; }
  .tool.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tool.locked { color: var(--muted); }
  .tool.locked::after { content: "🔒"; font-size: 11px; }
  .tool.unlocked-flash { animation: flash 1s ease; }
  @keyframes flash {
    0% { box-shadow: 0 0 0 0 var(--ok); }
    50% { box-shadow: 0 0 0 12px rgba(87,176,107,0); }
  }

  #world-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .world-tab {
    flex: 1; background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
    padding: 7px 8px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 600;
    text-align: center; transition: background 0.12s, border-color 0.12s;
  }
  .world-tab:hover { background: #232a33; }
  .world-tab.active { background: #1d4258; border-color: #2e6a8e; color: #fff; }
  .world-tab.locked::after { content: " 🔒"; font-size: 11px; }

  #sidebar {
    background: var(--panel); border-left: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0;
  }
  #sidebar header {
    padding: 14px 16px; border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  #sidebar header b { color: var(--text); font-weight: 600; letter-spacing: 0; text-transform: none; font-family: system-ui; font-size: 14px; display: block; margin-bottom: 2px; }
  #progress { padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .row b { color: var(--text); }
  .bar { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
  .bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width 0.4s ease; }
  #log { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  #log .entry { padding: 6px 0; border-bottom: 1px dashed #222831; }
  #log .entry b { color: var(--text); }
  #log .entry.solve b { color: var(--ok); }
  #log .entry.hint b { color: var(--accent-2); }

  /* Math modal */
  #overlay {
    position: fixed; inset: 0; background: rgba(5,6,8,0.78);
    display: none; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(4px);
  }
  #overlay.show { display: flex; }
  #modal {
    width: min(560px, 92vw); background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 0; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  #modal .head {
    background: #0f1318; padding: 14px 18px; border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 12px; color: var(--accent);
  }
  #modal .head .sub { color: var(--muted); margin-top: 4px; }
  #modal .body { padding: 22px 22px 18px; }
  #modal .level { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  #problem { font-family: var(--mono); font-size: 34px; margin: 10px 0 18px; color: var(--text); letter-spacing: 0.02em; }
  #answer {
    width: 100%; padding: 12px 14px; background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 18px;
    outline: none;
  }
  #answer:focus { border-color: var(--accent-2); }
  #feedback { min-height: 20px; margin-top: 10px; font-size: 13px; color: var(--muted); }
  #feedback.ok { color: var(--ok); }
  #feedback.nope { color: var(--accent-2); }
  #hint {
    margin-top: 14px; padding: 14px; background: #0f1318; border: 1px solid var(--line);
    border-radius: 8px; font-size: 13px; color: var(--text); line-height: 1.55;
    display: none;
  }
  #hint.show { display: block; }
  #hint code { font-family: var(--mono); background: #1a1f26; padding: 1px 6px; border-radius: 4px; color: var(--accent-2); }
  #hint h4 { margin: 0 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
  #modal .actions {
    display: flex; gap: 8px; justify-content: space-between; padding: 14px 22px;
    background: #0f1318; border-top: 1px solid var(--line);
  }
  #modal button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  #modal button:hover { background: #232a33; }
  #modal button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  #modal button.primary:hover { background: #c03939; }
  #modal button.ghost { color: var(--muted); }

  /* Proficiency panel */
  .section-label {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
    padding: 0 4px;
  }
  #proficiency {
    padding: 10px 14px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  #grade-display {
    font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px;
  }
  #standard-display {
    font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 8px;
  }
  .lbar-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    font-size: 11px; color: var(--muted);
  }
  .lbar-label { width: 28px; flex-shrink: 0; }
  .lbar-track { flex: 1; height: 4px; background: var(--panel-2); border-radius: 2px; overflow: hidden; }
  .lbar-track > div { height: 100%; background: linear-gradient(90deg, var(--ok), var(--accent-2)); width: 0; transition: width 0.4s ease; }
  .lbar-count { width: 18px; text-align: right; flex-shrink: 0; color: var(--text); }

  /* Phone layout: stage on top, tool drawer below, log hidden */
  @media (max-width: 820px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    #sidebar { border-left: none; border-top: 1px solid var(--line); max-height: 45vh; overflow-y: auto; }
    #sidebar header { display: none; }
    #log { display: none; }
    #proficiency { padding: 8px 14px; }
    #tool-panel { max-height: none; }
    #panel-toggle { display: block; }
    body.panel-hidden #sidebar { display: none; }
    #hud { bottom: calc(10px + env(safe-area-inset-bottom)); }
    #problem { font-size: 26px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="canvas"></canvas>
    <button id="panel-toggle" title="Toggle tools">🛠</button>
    <div id="hud">
      <div class="pill">Tier <b id="tier">Civilian</b></div>
      <div class="pill">Solved <b id="solved">0</b></div>
      <div class="pill">Skips <b id="skips">0</b></div>
    </div>
  </div>

  <aside id="sidebar">
    <header>
      <b>Calculus Carnage</b>
      Prototype build · v0.2 — two worlds
    </header>
    <div id="proficiency">
      <div class="section-label">Math Proficiency</div>
      <div id="grade-display">—</div>
      <div id="standard-display">Solve a problem to see your level</div>
      <div id="level-bars">
        <div class="lbar-row"><span class="lbar-label">Lv 1</span><div class="lbar-track"><div id="lbar1"></div></div><span class="lbar-count" id="lcount1">0</span></div>
        <div class="lbar-row"><span class="lbar-label">Lv 2</span><div class="lbar-track"><div id="lbar2"></div></div><span class="lbar-count" id="lcount2">0</span></div>
        <div class="lbar-row"><span class="lbar-label">Lv 3</span><div class="lbar-track"><div id="lbar3"></div></div><span class="lbar-count" id="lcount3">0</span></div>
        <div class="lbar-row"><span class="lbar-label">Lv 4</span><div class="lbar-track"><div id="lbar4"></div></div><span class="lbar-count" id="lcount4">0</span></div>
      </div>
    </div>
    <div id="tool-panel">
      <div class="section-label">World</div>
      <div id="world-tabs"></div>
      <div class="section-label">Tools</div>
      <div id="toolbar"></div>
    </div>
    <div id="progress">
      <div class="row"><span>Next unlock</span><b id="next-unlock">—</b></div>
      <div class="bar"><div id="bar"></div></div>
    </div>
    <div id="log"></div>
  </aside>
</div>

<div id="overlay">
  <div id="modal">
    <div class="head">
      // ITEM LOCKED: <span id="lock-name">—</span>
      <div class="sub">Solve to unlock. No time limit. You can ask for a breakdown at any time.</div>
    </div>
    <div class="body">
      <div class="level">Level <span id="lvl">1</span></div>
      <div id="problem">x + 0 = 0</div>
      <input id="answer" type="text" inputmode="numeric" autocomplete="off" placeholder="x = ?" />
      <div id="feedback"></div>
      <div id="hint"></div>
    </div>
    <div class="actions">
      <div style="display:flex; gap:8px;">
        <button id="hint-btn">Break it down</button>
        <button id="skip-btn" class="ghost">Use skip token (0)</button>
      </div>
      <div style="display:flex; gap:8px;">
        <button id="cancel-btn" class="ghost">Back to sandbox</button>
        <button id="submit-btn" class="primary">Submit</button>
      </div>
    </div>
  </div>
</div>

<script src="matter.min.js"></script>
<script src="main.js"></script>
<script>
  // Offline support — only on http(s); silently skipped when opened as a file.
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
